<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows-11</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <video id="bg-video" autoplay muted playsinline>
        <source src="video.webm" type="video/webm" />
        Your browser does not support the video tag.
      </video>

      <div class="top">
        <div class="icons">
          <div class="img">
            <img src="folderIcon.png" alt="" />
          </div>
          <div class="title">
            <p>JavaScript Notes</p>
          </div>
        </div>
        <div class="icons">
          <div class="img">
            <img src="chromeicon.png" alt="chrome Image" />
          </div>
          <div class="title">
            <p>Chrome</p>
          </div>
        </div>
        <div class="icons">
          <div class="img">
            <img src="folderIcon.png" alt="folder" />
          </div>
          <div class="title">
            <p>React Imp</p>
          </div>
        </div>
        <div class="icons">
          <div class="img">
            <img src="edgeicon.png" alt="edge" />
          </div>
          <div class="title">
            <p>Edge</p>
          </div>
        </div>
        <div class="icons">
          <div class="img">
            <img src="recycleBin.png" alt="recycle" />
          </div>
          <div class="title">
            <p>Recycle Bin</p>
          </div>
        </div>
        <div class="icons">
          <div class="img">
            <img src="folderIcon.png" alt="" />
          </div>
          <div class="title">
            <p>JavaScript Notes</p>
          </div>
        </div>
      </div>
      <div class="taskbar">
        <div class="leftIcon taskIcons">
          <div class="taskImg">
            <img src="whether.png" alt="whether" />
          </div>
        </div>
        <div class="middleIcon taskIcons">
          <div class="taskImg">
            <img src="whether.png" alt="whether" />
          </div>

          <div class="taskImg">
            <img src="vsCode.png" alt="whether" />
          </div>
          <div class="taskImg">
            <img src="edgeicon.png" alt="whether" />
          </div>
          <div class="taskImg">
            <img src="chromeicon.png" alt="whether" />
          </div>
          <div class="taskImg">
            <img src="vsCode.png" alt="whether" />
          </div>
        </div>
        <div class="rightIcon taskIcons">
          <div class="taskImg">
            <img src="whether.png" alt="whether" />
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
