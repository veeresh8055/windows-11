<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start Menu Div Clone</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #3a4f67 0%, #17212d 55%, #111821 100%);
        padding: 20px;
      }

      .startmenu-clone {
        width: min(630px, 92vw);
        aspect-ratio: 630 / 653;
        border-radius: 8px;
        background: url("startmenu.PNG") center / 100% 100% no-repeat;
        transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
        will-change: transform;
      }

      .startmenu-clone:hover {
        transform: translateY(-6px) scale(1.01);
        box-shadow: 0 24px 45px rgba(0, 0, 0, 0.38);
        filter: brightness(1.035);
      }
    </style>
  </head>
  <body>
    <div class="startmenu-clone" role="img" aria-label="Windows 11 start menu"></div>
  </body>
</html>
